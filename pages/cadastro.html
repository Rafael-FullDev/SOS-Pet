<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <title>Cadastre-se</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alien+Block&family=Ole&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/cadastro.css">
  <link rel="stylesheet" href="../css/global.css">

</head>

<body>
  <header class="Cabecalho">
    <img src="../assets/images/shared/logo.png" alt="SOS Pet" class="Logo">
  </header>
  <main class="PrincipalCadastre-se">
    <div class="Container">
      <div>
        <h1 class="Titulo">Cadastre-se</h1>
        <p class="Subtitulo">Cuidar é salvar vidas</p>
      </div>

      <div id="RedesSociais" class="RedesSociais" aria-label="Cadastro com redes sociais">
        <div class="RedesSociaisLista">
          <a href="#" aria-label="Cadastrar com Facebook">
            <i class="fa-brands fa-facebook-f" aria-hidden="true"></i>
          </a>

          <a href="#" aria-label="Cadastrar com Google">
            <i class="fa-brands fa-google" aria-hidden="true"></i>
          </a>

          <a href="#" aria-label="Cadastrar com Apple">
            <i class="fa-brands fa-apple" aria-hidden="true"></i>
          </a>
        </div>
      </div>

      <div class="Formulario">
        <form action="#">
          <div class="GrupoCartao">

            <!-- Email -->
            <div class="Cartao">
              <label for="Email">E-mail</label>
              <input id="Email" type="email" name="Email" placeholder="Digite seu E-mail" required>
              <span class="Span">No mínimo 8 caracteres.</span>
            </div>

            <!-- Nome -->
            <div class="Cartao">
              <label for="Name">Nome</label>
              <input id="Name" type="name" name="Name" placeholder="Digite seu nome completo" required>
              <span class="Span">No mínimo 8 caracteres.</span>
            </div>

            <!-- Cidade -->
            <div class="Cartao">
              <label for="Cidade">Cidade</label>
              <input id="Cidade" type="cidade" name="Cidade" placeholder="Digite sua cidade" required>
              <span class="Span">No mínimo 8 caracteres.</span>
            </div>

            <!-- Senha -->
            <div class="Cartao">
              <label for="Password">Senha</label>
              <input id="Password" type="password" name="Password" placeholder="Digite sua senha" required>
              <span class="Span">No mínimo 8 caracteres.</span>
            </div>

            <!-- Confirmar senha -->
            <div class="Cartao">
              <label for="ConfirmarSenha">Confirmar senha</label>
              <input id="ConfirmarSenha" type="confirmarsenha" name="ConfirmarSenha" placeholder="Confirme sua senha" required>
              <span class="Span">No mínimo 8 caracteres.</span>
            </div>

            <!-- lembrar de mim -->
            <div class="LembrarDeMim">
              <input type="checkbox" id="lembrar" name="lembrar" value="sim">
              <label for="lembrar">Lembrar de mim neste dispositivo</label>
            </div>

            <!-- Botao -->
            <button class="BotaoCadastro">Cadastrar</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <hr class="Divisor">
  <!-- footer -->
  <footer class="RodaPé">

    <p><small>@ 2026 SOS pet. Todos os direitos reservados.
        <br>Privacidade • Termos • Acessibilidade.
        <br>Precisa de ajuda? Contate suporte@sospet.exemplo</small></p>
  </footer>
</body>

</html>
